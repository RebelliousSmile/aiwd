# AIDW Collector — Configuration (optionnelle)

# Ce fichier est facultatif. Si tu ne le remplis pas, aidw-collector
# détecte tout automatiquement depuis le code et les docs du projet.
# Renseigner uniquement les champs que tu veux forcer/corriger.

project:
  # name: ""         # Forcer le nom (sinon inféré depuis package.json / README / nom dossier)
  # type: ""         # Forcer le type : technical-doc | user-guide | api-doc | process-doc
  # language: "fr"   # Langue de sortie des fichiers produits (défaut: fr)

client:
  # name: ""         # Forcer le nom client (sinon inféré)
  # sector: ""       # Préciser le secteur si non détectable depuis le code
  # audience: ""     # Préciser l'audience si non détectable

scope:
  # Dossiers à exclure (s'ajoute aux exclusions par défaut)
  # exclude_dirs: ""

  # Désactiver des extracteurs même si détectés
  # screens: false         # Forcer skip même si UI détectée
  # access: false          # Forcer skip même si auth détectée
  # deployment: false      # Forcer skip même si config déploiement détectée
  # requirements: false    # Forcer skip même si specs fonctionnelles détectées

  # Forcer l'activation d'un extracteur même si non auto-détecté
  # requirements: true     # Forcer l'extraction des specs (utile si docs/functional/ existe)

custom_themes:
  # Thèmes supplémentaires hors extracteurs standards.
  # Chaque thème produit un fichier dest/[slug].md
  # Utiliser uniquement pour des domaines fonctionnels majeurs sans correspondance dans les 8 extracteurs.
  # Exemple :
  # - slug: "multi-tenant"
  #   description: "Architecture multi-tenant, isolation données, ExecutionContext"
  #   sources: ["docs/multi-tenant-guide.md", "src/services/DatabaseService.js"]
  # - slug: "qr-system"
  #   description: "Système QR codes, génération, workflows d'impression"
  #   sources: ["docs/memory-bank/guides/", "src/services/QRService.js"]
