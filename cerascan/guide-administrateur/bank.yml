# bank.yml - Guide Administrateur CERASCAN
# Documentation technique et d'administration de la plateforme SaaS multi-tenant

# ===================================================================
# IDENTIFICATION
# ===================================================================
document:
  name: "Guide Administrateur CERASCAN"
  client: "cerascan"
  type: "technical-doc"  # Documentation technique/administration

# ===================================================================
# RESSOURCES OBLIGATOIRES
# ===================================================================

# Style d'écriture
output-style:
  global: "docs/output-styles/user-friendly.md"  # Changé : Laurent n'est pas technique

# ===================================================================
# DOCUMENTATION CLIENT
# ===================================================================

docs:
  # --- Obligatoires ---
  client: "../.docs/CLIENT.md"
  glossaire: "../.docs/glossaire.md"
  
  # --- Documentation technique ---
  architecture: "../.docs/architecture.md"
  deployment: "../.docs/deployment.md"
  multi-tenant: "../.docs/multi-tenant.md"
  qr-system: "../.docs/qr-system.md"
  
  # --- Users & workflows ---
  users: "../.docs/users.md"
  workflows: "../.docs/workflows.md"

# Overview
overview: "overview.md"

# Table des matières
toc:
  fichier: ".toc/INDEX.md"

# Personas pour review (comment.prompt.md)
personas:
  - platform-admin  # Lit TOUT (admin + partenaire + commercial)

# ===================================================================
# EXPORT ICML
# ===================================================================

icml:
  chapitres-source: "chapitres/"
  chapitres-order:
    # À définir après génération TOC
  output: "output/guide-administrateur.icml"

# ===================================================================
# METADONNEES
# ===================================================================
metadata:
  auteur: "fxgui"
  date-creation: "2026-02-28"
  version: "1.0"
  statut: "draft"
  tags:
    - "administration"
    - "technique"
    - "multi-tenant"
    - "super-utilisateur"
