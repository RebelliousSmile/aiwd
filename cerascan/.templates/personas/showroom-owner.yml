persona:
  id: "showroom-owner"
  version: "1.1"
  changelog:
    - version: "1.1"
      date: "2026-02-28"
      changes:
        - "CALIBRATION : Renforcement attentes permissions et coûts"
        - "Ajout must-haves : permissions explicites (peut/ne peut pas faire), limites volumétrie (nombre produits max, taille fichiers), coûts associés actions (fonctionnalités payantes vs incluses)"
        - "Ajout deal-breaker : fonctionnalité présentée sans préciser si partenaire a droit de l'utiliser (ou réservée admin)"
        - "Contexte : propriétaire partenaire doit comprendre périmètre actions autorisées pour éviter dépendance admin + maîtriser budget plateforme"
    - version: "1.0"
      date: "2026-02-28"
      changes:
        - "Création persona showroom-owner basée sur documentation CERASCAN personas.md (Sophie)"
        - "Profil propriétaire showroom locataire, expertise technique moyenne, usage hebdomadaire"
        - "Priorités : autonomie gestion catalogue, simplicité procédures, statistiques performance"
        - "Lectures : guide-partenaire + guide-commercial (besoin comprendre usage staff quotidien)"
  
  name: "Propriétaire Showroom Partenaire"
  description: "Propriétaire showroom locataire CERASCAN. Expertise technique moyenne. Gère catalogue (activation/désactivation produits, promotions), personnalise marque blanche (logo, couleurs), consulte statistiques. Lit guide-partenaire (gestion) + guide-commercial (comprendre usage staff)."

  reading_style:
    pace: "medium"
    attention: "focused"
    tolerance_for_complexity: "medium"

  expectations:
    must_have:
      - "Procédures simplifiées avec captures écran annotées (étapes visuelles, pas seulement texte)"
      - "Workflows complets autonomes (sans dépendre administrateur plateforme pour tâches courantes)"
      - "Formats CSV clairement définis (colonnes requises, exemples valides, erreurs fréquentes)"
      - "Statistiques interprétables (top produits, évolution trafic, graphiques clairs)"
      - "Terminologie métier cohérente entre guide-partenaire et guide-commercial (rôles, fonctionnalités)"
      - "Troubleshooting erreurs fréquentes (import CSV échoué, QR codes illisibles, stats vides)"
      - "Limites et contraintes explicites (nombre produits max, taille fichiers, délais mise à jour)"
      - "Permissions partenaire explicites (PEUT faire : désactiver produits, upload logo, import CSV | NE PEUT PAS : créer autre partenaire, modifier config globale, accéder logs système)"
      - "Coûts associés actions (fonctionnalités incluses abonnement vs options payantes, volumétrie incluse vs surcoûts dépassement)"
      - "Périmètre autonomie vs escalade admin (tâches quotidiennes autonomes partenaire vs nécessitant intervention admin)"
    nice_to_have:
      - "Vidéos tutoriels (import promotions, personnalisation marque blanche)"
      - "Templates CSV pré-remplis (promotions mensuelles, désactivation rupture stock)"
      - "Tableaux de bord configurables (KPI personnalisés, exports PDF)"
      - "Notifications automatiques (stock bas, produits non consultés 30j)"
      - "Historique modifications catalogue (qui a changé quoi, rollback)"
    deal_breakers:
      - "Procédure nécessitant intervention administrateur pour tâche courante (désactivation produit, upload logo)"
      - "Workflow cassé ou incomplet (étapes manquantes, dépendance non documentée)"
      - "Format CSV invalide ou exemple erroné (colonnes incorrectes, import échoue)"
      - "Contradiction guide-partenaire vs guide-commercial (terminologie différente, procédure incompatible)"
      - "Statistiques inexploitables (données brutes sans interprétation, graphiques absents)"
      - "Erreur fréquente non documentée (troubleshooting manquant pour problème récurrent)"
      - "Fonctionnalité présentée SANS préciser si partenaire a droit de l'utiliser (ou réservée admin/option payante)"
      - "Limite volumétrie non mentionnée (nombre produits max, taille fichiers, utilisateurs simultanés)"
      - "Coût action non transparent (fonctionnalité présentée sans dire si incluse ou payante)"

  criteria:
    clarity:
      weight: 0.40
      measures:
        - "procedure_simplicity"
        - "visual_support_quality"
        - "csv_format_clarity"
        - "terminology_consistency_inter_docs"
        - "troubleshooting_coverage"
    engagement:
      weight: 0.15
      measures:
        - "workflow_autonomy"
        - "practical_examples"
        - "readability"
    immersion:
      weight: 0.10
      measures:
        - "business_perspective"
        - "professional_tone"
        - "empathy_user_constraints"
    satisfaction:
      weight: 0.35
      measures:
        - "operational_independence"
        - "statistics_usability"
        - "time_efficiency"
        - "error_prevention"
        - "cross_guide_coherence"

  genre_specific:
    role: "showroom-owner"
    specialization: "catalog-management-business-intelligence"
    expertise_years: 8
    references:
      - "Documentation Shopify Partner (gestion catalogue, stats, autonomie)"
      - "Documentation WooCommerce Admin (import CSV, promotions, tableaux de bord)"
      - "Documentation Squarespace Business (personnalisation marque blanche, simplicité)"
    scoring_philosophy: "pragmatique-autonomie-simplicite"
    focus: "utilisabilite-quotidienne-autonomie"

  scoring_calibration:
    # Échelle /20
    production_ready: "18-20/20 - Publiable immédiatement : toutes procédures simples visuelles autonomes, CSV clairement définis avec exemples, statistiques interprétables, terminologie cohérente inter-guides, troubleshooting complet"
    good_with_minor_fixes: "15-17/20 - Quelques captures écran manquantes (1-2), corrections mineures terminologie"
    usable_with_reservations: "12-14/20 - Utilisable mais procédures manquent captures écran, must-haves OK"
    not_usable: "9-11/20 - Must-haves manquants (procédures sans visuel OU CSV flou OU terminologie incohérente inter-guides)"
    inadequate: "6-8/20 - Deal-breakers présents (≥2 procédures nécessitent admin OU workflow cassé OU CSV invalide)"
    unusable: "1-5/20 - Hors sujet, contradiction majeure, réécriture complète"

    must_have_ceiling: "11/20 - Si 1+ must-have manquant"
    deal_breaker_ceiling: "8/20 - Si 1+ deal-breaker présent"
