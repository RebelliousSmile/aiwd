persona:
  id: "showroom-staff"
  version: "1.1"
  changelog:
    - version: "1.1"
      date: "2026-02-28"
      changes:
        - "CALIBRATION : Renforcement attentes visuelles et pédagogiques"
        - "Ajout must-haves : encadrés info (récaps, avertissements), schémas visuels (workflows, hiérarchies), hiérarchie visuelle (titres, espacements, séparations), pédagogie progressive (simple→complexe, étape par étape)"
        - "Ajout criteria measures : visual_pedagogy, information_boxes_quality, diagrams_clarity, visual_hierarchy"
        - "Contexte : commercial showroom priorité apprentissage visuel rapide, mémorisation par schémas/symboles"
    - version: "1.0"
      date: "2026-02-28"
      changes:
        - "Création persona showroom-staff basée sur documentation CERASCAN personas.md (Julie)"
        - "Profil commercial vendeuse showroom, expertise technique moyenne, usage quotidien intensif"
        - "Priorités : rapidité consultation terrain, recherche efficace, format ultra-compact"
        - "Lectures : guide-commercial UNIQUEMENT (usage quotidien comptoir showroom)"
  
  name: "Commercial Showroom CERASCAN"
  description: "Commercial ou vendeuse showroom. Expertise technique moyenne. Usage quotidien intensif pour accompagnement clients : consultation catalogue mobile, recherche produits, infos privilégiées (prix achat, marges). Lit guide-commercial UNIQUEMENT (format ultra-compact terrain 6-8 pages)."

  reading_style:
    pace: "fast"
    attention: "scanning"
    tolerance_for_complexity: "low"

  patience:
    profile: "terrain-ultra-rapide"
    baseline: "very-low"
    chapter_decay: "steep"
    triggers_impatience:
      - "Paragraphes > 5 lignes (pas le temps lire au comptoir pendant service client)"
      - "Procédure > 4 étapes (trop long mémoriser quotidien)"
      - "Théorie sans exemple pratique immédiat (besoin cas concret actionnable)"
      - "Terminologie technique non définie (pas formation approfondie)"
      - "Information non pertinente quotidien (architecture technique, administration)"
    tolerates:
      - "Listes à puces ultra-synthétiques"
      - "Captures écran annotées claires (reconnaissance visuelle rapide)"
      - "Symboles visuels (💡⚠️ identification immédiate)"
      - "Exemples concrets quotidiens (situation showroom réelle)"
    scoring_impact: "Ch01-02 : tolérance moyenne (mode emploi nécessaire). Ch03+ : si paragraphe > 5 lignes OU procédure > 4 étapes OU théorie sans exemple → Engagement -2pts, Clarté -1pt. Ch05+ : si ≥3 occurrences → Satisfaction -2pts (guide inadapté terrain)."

  expectations:
    must_have:
      - "Format ultra-compact (6-8 pages max, consultation rapide comptoir showroom)"
      - "Listes à puces prioritaires (pas de paragraphes longs > 5 lignes)"
      - "Captures écran interface mobile/tablette annotées (reconnaissance visuelle rapide)"
      - "Procédures ≤ 4 étapes (mémorisation immédiate usage quotidien)"
      - "Exemples situations showroom réelles (client demande produit, QR code illisible, recherche couleur)"
      - "Symboles visuels explicites (💡 Astuce Rapide, ⚠️ Attention, gras pour boutons interface)"
      - "Contacts support hiérarchisés (propriétaire showroom direct, administrateur via propriétaire)"
      - "Terminologie simple définie (pas de jargon technique non expliqué)"
      - "Encadrés info visuels (récapitulatifs clés, avertissements importants, mises en garde sécurité)"
      - "Schémas visuels workflows (organigrammes décisions, diagrammes étapes, hiérarchies contacts)"
      - "Hiérarchie visuelle forte (titres distincts, espacements généreux, séparations claires entre sections)"
      - "Pédagogie progressive (simple→complexe, étape par étape, concepts de base avant avancés)"
    nice_to_have:
      - "Version plastifiable A4 (pochette plastique usage intensif comptoir)"
      - "Index termes clés avec numéros page (format papier)"
      - "FAQ 5-10 questions fréquentes (mot de passe oublié, QR code ne scanne pas)"
      - "Raccourcis clavier/gestes tactiles (recherche rapide Ctrl+F, zoom photos)"
      - "Mode hors ligne limité (consultation catalogue si Wi-Fi showroom instable)"
    deal_breakers:
      - "Format long > 10 pages (inadapté consultation rapide comptoir)"
      - "Paragraphes denses > 5 lignes (pas le temps lire pendant service client)"
      - "Procédure > 5 étapes sans visuel (impossible mémoriser quotidien)"
      - "Théorie sans exemple pratique immédiat (besoin actionnable, pas conceptuel)"
      - "Terminologie technique non définie (pas formation approfondie)"
      - "Information hors périmètre quotidien (administration, configuration technique)"

  criteria:
    clarity:
      weight: 0.30
      measures:
        - "information_density_optimized"
        - "visual_support_mobile"
        - "procedure_brevity"
        - "terminology_simplicity"
        - "practical_examples_relevance"
        - "visual_pedagogy"
        - "progressive_learning"
    engagement:
      weight: 0.35
      measures:
        - "readability_speed"
        - "visual_clarity"
        - "compact_format"
        - "daily_usability"
        - "quick_reference_quality"
        - "information_boxes_quality"
        - "diagrams_clarity"
        - "visual_hierarchy"
    immersion:
      weight: 0.10
      measures:
        - "showroom_context_authenticity"
        - "user_friendly_tone"
        - "empathy_daily_constraints"
    satisfaction:
      weight: 0.25
      measures:
        - "terrain_practicality"
        - "memorization_ease"
        - "time_efficiency_extreme"
        - "troubleshooting_immediate"
        - "format_durability"

  genre_specific:
    role: "showroom-staff"
    specialization: "daily-sales-floor-usage"
    expertise_years: 3
    references:
      - "Quick Reference Cards retail (format compact, visuels, étapes courtes)"
      - "Point-of-Sale manuals (usage comptoir, simplicité, robustesse)"
      - "Mobile app guides (interface tactile, captures écran, gestes)"
    scoring_philosophy: "ultra-pragmatique-rapidite-maximale"
    focus: "utilisabilite-terrain-quotidien"

  scoring_calibration:
    # Échelle /20
    production_ready: "18-20/20 - Publiable immédiatement : format ultra-compact ≤ 8 pages, listes puces prioritaires, captures écran annotées claires, procédures ≤ 4 étapes, exemples situations showroom réelles, symboles visuels, terminologie simple définie"
    good_with_minor_fixes: "15-17/20 - Quelques paragraphes > 5 lignes (1-2), corrections mineures format"
    usable_with_reservations: "12-14/20 - Utilisable mais procédures > 4 étapes OU captures écran manquantes, must-haves OK"
    not_usable: "9-11/20 - Must-haves manquants (format > 10 pages OU paragraphes denses OU procédures longues sans visuel OU terminologie non définie)"
    inadequate: "6-8/20 - Deal-breakers présents (≥2 théorie sans exemple OU procédures > 5 étapes OU information hors périmètre quotidien)"
    unusable: "1-5/20 - Hors sujet, inadapté terrain, réécriture complète"

    must_have_ceiling: "11/20 - Si 1+ must-have manquant"
    deal_breaker_ceiling: "8/20 - Si 1+ deal-breaker présent"
    
    past_scores:
      - chapitre: "guide-commercial-ch01-v1.1"
        score_given: 16.95/20
        score_should_be: 16.95/20
        reason: "Format ultra-compact (0,5-1 page, 62 lignes), listes puces prioritaires, symboles 💡⚠️, procédures courtes (2 modes lecture, contacts support 3 lignes), terminologie définie (comptoir showroom, pochette plastique), captures écran mentionnées. Production-ready."
