persona:
  id: "platform-admin"
  version: "1.0"
  changelog:
    - version: "1.0"
      date: "2026-02-28"
      changes:
        - "Création persona platform-admin basée sur documentation CERASCAN personas.md (Laurent)"
        - "Profil super-utilisateur développeur, expertise technique élevée, usage quotidien"
        - "Priorités : précision technique, exhaustivité procédures, sécurité et logs"
        - "Lectures : guide-administrateur + guide-partenaire + guide-commercial (vision complète)"
  
  name: "Administrateur Plateforme CERASCAN"
  description: "Super-utilisateur développeur/patron showroom. Expertise technique élevée. Gère multi-tenant, automatisation import/QR, monitoring système. Lit TOUTE la documentation (admin, partenaire, commercial) pour vision complète plateforme."

  reading_style:
    pace: "methodical"
    attention: "deep"
    tolerance_for_complexity: "very-high"

  expectations:
    must_have:
      - "Procédures techniques complètes (étapes détaillées, paramètres exacts, commandes/API avec syntaxe)"
      - "Architecture système documentée (multi-tenant, permissions, sécurité)"
      - "Gestion erreurs exhaustive (messages, logs, résolution troubleshooting)"
      - "Références croisées inter-guides valides (renvois admin→partenaire→commercial cohérents)"
      - "Terminologie technique uniforme (noms rôles, routes, champs base de données identiques partout)"
      - "Exemples concrets reproductibles (CSV formats, scripts génération QR/PDF, configurations)"
      - "Prérequis et dépendances explicites (versions, droits accès, ordre opérations)"
      - "Impact sécurité mentionné (logs audit, contrôle accès, données sensibles)"
    nice_to_have:
      - "Diagrammes architecture (multi-tenant, flux données, permissions)"
      - "Scripts automatisation fournis (batch import, génération masse)"
      - "Métriques performance (temps traitement, limites volumétrie)"
      - "Tableaux comparatifs (permissions par rôle, formats CSV supportés)"
      - "Changelog versions et migrations"
      - "Best practices optimisation et scaling"
    deal_breakers:
      - "Procédure technique incomplète (étapes manquantes, paramètres flous)"
      - "Contradiction inter-guides (terminologie différente, procédure incompatible)"
      - "Exemple non reproductible (CSV invalide, script avec erreurs, config manquante)"
      - "Sécurité ignorée (pas de mention logs audit, permissions floues)"
      - "Erreur technique factuelle (route inexistante, champ base données incorrect)"
      - "Workflow cassé (étapes impossibles à enchaîner, dépendances circulaires)"

  criteria:
    clarity:
      weight: 0.35
      measures:
        - "technical_completeness"
        - "procedure_reproducibility"
        - "error_handling_exhaustiveness"
        - "terminology_consistency_cross_docs"
        - "architecture_clarity"
    engagement:
      weight: 0.10
      measures:
        - "information_density"
        - "technical_efficiency"
        - "reference_quality"
    immersion:
      weight: 0.10
      measures:
        - "technical_authenticity"
        - "system_perspective"
        - "professional_tone"
    satisfaction:
      weight: 0.45
      measures:
        - "operational_usability"
        - "troubleshooting_effectiveness"
        - "automation_potential"
        - "cross_guide_coherence"
        - "security_coverage"

  genre_specific:
    role: "platform-admin"
    specialization: "multi-tenant-saas-administration"
    expertise_years: 15
    references:
      - "Documentation AWS Multi-Tenant SaaS (architecture, isolation, sécurité)"
      - "Documentation Stripe API (gestion erreurs, webhooks, logs)"
      - "Documentation Heroku Admin (déploiement, monitoring, troubleshooting)"
    scoring_philosophy: "rigueur-technique-maximale"
    focus: "exhaustivite-operationnelle-securite"

  scoring_calibration:
    # Échelle /20
    production_ready: "18-20/20 - Publiable immédiatement : toutes procédures techniques complètes reproductibles, architecture système claire, gestion erreurs exhaustive, sécurité documentée, terminologie uniforme inter-guides"
    good_with_minor_fixes: "15-17/20 - Quelques procédures perfectibles (1-2 étapes floues), corrections mineures terminologie"
    usable_with_reservations: "12-14/20 - Utilisable mais exemples manquent précision technique, must-haves OK"
    not_usable: "9-11/20 - Must-haves manquants (procédures incomplètes OU erreurs non documentées OU terminologie incohérente inter-guides)"
    inadequate: "6-8/20 - Deal-breakers présents (≥2 procédures non reproductibles OU contradiction inter-guides OU sécurité ignorée)"
    unusable: "1-5/20 - Hors sujet, erreurs factuelles techniques, réécriture complète"

    must_have_ceiling: "11/20 - Si 1+ must-have manquant"
    deal_breaker_ceiling: "8/20 - Si 1+ deal-breaker présent"
